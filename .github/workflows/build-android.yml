name: Build Android APK

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths:
      - "mypos_mobile/**"
  pull_request:
    branches:
      - main
    paths:
      - "mypos_mobile/**"
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
          - profile

# Prevent concurrent builds on the same ref
concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # Build APK
  # ─────────────────────────────────────────────────────
  build:
    name: "🏗️ Build APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mypos_mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Decode signing keystore (optional, for release signing) ──
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "storeFile=keystore.jks" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      # ── Build APK ──
      - name: Build APK
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode || 'release' }}"
          echo "Building in $BUILD_MODE mode..."
          
          if [ "$BUILD_MODE" = "debug" ]; then
            flutter build apk --debug
          elif [ "$BUILD_MODE" = "profile" ]; then
            flutter build apk --profile
          else
            flutter build apk --release --split-per-abi
            flutter build apk --release  # Also build fat APK
          fi

      - name: Rename APK with version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          DATE=$(date +%Y%m%d)
          
          mkdir -p build/outputs
          
          # Fat APK
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk \
               "build/outputs/MyPOS-v${VERSION}-${DATE}.apk"
          fi
          
          # Per-ABI APKs
          for abi in armeabi-v7a arm64-v8a x86_64; do
            if [ -f "build/app/outputs/flutter-apk/app-${abi}-release.apk" ]; then
              cp "build/app/outputs/flutter-apk/app-${abi}-release.apk" \
                 "build/outputs/MyPOS-v${VERSION}-${DATE}-${abi}.apk"
            fi
          done
          
          echo "### 📦 Build Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh build/outputs/*.apk | awk '{print "- **" $NF "** — " $5}' >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ──
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mypos-android-apk
          path: mypos_mobile/build/outputs/*.apk
          retention-days: 30

      # ── Upload to GoFile (free hosting) ──
      - name: Find main APK
        id: find_apk
        run: |
          # Prefer fat APK for easy distribution
          FAT_APK=$(ls build/outputs/MyPOS-*-arm64-v8a.apk 2>/dev/null | head -1)
          if [ -z "$FAT_APK" ]; then
            FAT_APK=$(ls build/outputs/MyPOS-*.apk 2>/dev/null | head -1)
          fi
          
          if [ -n "$FAT_APK" ]; then
            echo "APK_PATH=$FAT_APK" >> $GITHUB_OUTPUT
            echo "APK_NAME=$(basename $FAT_APK)" >> $GITHUB_OUTPUT
            echo "Found: $FAT_APK"
          else
            echo "No APK found!"
          fi

      - name: Upload to GoFile
        id: gofile
        if: steps.find_apk.outputs.APK_PATH != ''
        run: |
          APK="${{ steps.find_apk.outputs.APK_PATH }}"
          echo "Uploading $APK to GoFile..."
          
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          echo "Using server: $SERVER"
          
          RESPONSE=$(curl -s -F "file=@$APK" "https://${SERVER}.gofile.io/contents/uploadfile")
          DOWNLOAD_PAGE=$(echo $RESPONSE | jq -r '.data.downloadPage')
          
          echo "DOWNLOAD_PAGE=$DOWNLOAD_PAGE" >> $GITHUB_OUTPUT
          echo "Download page: $DOWNLOAD_PAGE"

      - name: Upload to Pixeldrain
        id: pixeldrain
        if: steps.find_apk.outputs.APK_PATH != ''
        run: |
          APK="${{ steps.find_apk.outputs.APK_PATH }}"
          APK_NAME="${{ steps.find_apk.outputs.APK_NAME }}"
          echo "Uploading $APK_NAME to Pixeldrain..."
          
          RESPONSE=$(curl -s -T "$APK" "https://pixeldrain.com/api/file/$APK_NAME")
          FILE_ID=$(echo $RESPONSE | jq -r '.id')
          
          if [ "$FILE_ID" != "null" ] && [ -n "$FILE_ID" ]; then
            DIRECT_LINK="https://pixeldrain.com/u/$FILE_ID"
            API_LINK="https://pixeldrain.com/api/file/$FILE_ID?download"
            echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_OUTPUT
            echo "API_LINK=$API_LINK" >> $GITHUB_OUTPUT
            echo "Pixeldrain: $DIRECT_LINK"
          else
            echo "Pixeldrain upload failed"
          fi

      # ── Download links summary ──
      - name: "📥 Download Links Summary"
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║           🔗 DOWNLOAD LINKS                     ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  📦 ${{ steps.find_apk.outputs.APK_NAME }}"
          if [ -n "${{ steps.gofile.outputs.DOWNLOAD_PAGE }}" ]; then
            echo "║  🌐 GoFile:     ${{ steps.gofile.outputs.DOWNLOAD_PAGE }}"
          fi
          if [ -n "${{ steps.pixeldrain.outputs.DIRECT_LINK }}" ]; then
            echo "║  🌐 Pixeldrain: ${{ steps.pixeldrain.outputs.DIRECT_LINK }}"
          fi
          echo "╚══════════════════════════════════════════════════╝"
          
          # Job Summary
          echo "## 📥 Download Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ steps.find_apk.outputs.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.gofile.outputs.DOWNLOAD_PAGE }}" ]; then
            echo "🌐 **GoFile:** ${{ steps.gofile.outputs.DOWNLOAD_PAGE }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.pixeldrain.outputs.DIRECT_LINK }}" ]; then
            echo "🌐 **Pixeldrain:** ${{ steps.pixeldrain.outputs.DIRECT_LINK }}" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ **Direct:** ${{ steps.pixeldrain.outputs.API_LINK }}" >> $GITHUB_STEP_SUMMARY
          fi

      # ── GitHub Release (on tag push) ──
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: mypos_mobile/build/outputs/*.apk
          draft: false
          prerelease: false
          body: |
            ## 📱 Android APK

            **GoFile:** ${{ steps.gofile.outputs.DOWNLOAD_PAGE }}
            **Pixeldrain:** ${{ steps.pixeldrain.outputs.DIRECT_LINK }}
            **Direct Download:** ${{ steps.pixeldrain.outputs.API_LINK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

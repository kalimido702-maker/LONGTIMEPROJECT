name: Build Release AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.2.0) — leave empty to use pubspec.yaml"
        required: false
        type: string
      version_code:
        description: "Version code (e.g. 5) — leave empty to auto-increment"
        required: false
        type: string

# Prevent concurrent builds
concurrency:
  group: android-aab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aab:
    name: "🏗️ Build Release AAB"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mypos_mobile

    steps:
      # ── Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ──
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      # ── Flutter ──
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          cache: true

      # ── Dependencies ──
      - name: Install dependencies
        run: flutter pub get

      # ── Version handling ──
      - name: Set version
        id: version
        run: |
          CURRENT=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          CURRENT_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          CURRENT_CODE=$(echo "$CURRENT" | cut -d'+' -f2)

          # Use input or current
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"

          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="$CURRENT_NAME"
          fi
          if [ -z "$VERSION_CODE" ]; then
            VERSION_CODE=$((CURRENT_CODE + 1))
          fi

          FULL_VERSION="${VERSION_NAME}+${VERSION_CODE}"

          # Update pubspec.yaml
          sed -i "s/version: $CURRENT/version: $FULL_VERSION/" pubspec.yaml
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building version: $FULL_VERSION"

      # ── Decode signing keystore ──
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set!"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "storeFile=upload-keystore.jks" > android/key.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "✅ Keystore decoded and key.properties created"

      # ── Build AAB ──
      - name: Build release AAB
        run: flutter build appbundle --release

      # ── Rename & prepare ──
      - name: Prepare AAB artifact
        id: prepare
        run: |
          VERSION="${{ steps.version.outputs.full_version }}"
          DATE=$(date +%Y%m%d)
          AAB_SRC="build/app/outputs/bundle/release/app-release.aab"

          if [ ! -f "$AAB_SRC" ]; then
            echo "::error::AAB not found at $AAB_SRC"
            exit 1
          fi

          mkdir -p build/outputs
          AAB_NAME="MyPOS-v${VERSION}-${DATE}.aab"
          cp "$AAB_SRC" "build/outputs/$AAB_NAME"

          AAB_SIZE=$(du -h "build/outputs/$AAB_NAME" | awk '{print $1}')
          echo "aab_name=$AAB_NAME" >> $GITHUB_OUTPUT
          echo "aab_size=$AAB_SIZE" >> $GITHUB_OUTPUT
          echo "aab_path=build/outputs/$AAB_NAME" >> $GITHUB_OUTPUT

          echo "### 📦 AAB Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** \`$AAB_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** $AAB_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY

      # ── Upload as GitHub artifact ──
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: mypos-release-aab
          path: mypos_mobile/build/outputs/*.aab
          retention-days: 90

      # ── Upload to Pixeldrain for easy download ──
      - name: Upload to Pixeldrain
        id: pixeldrain
        run: |
          AAB="${{ steps.prepare.outputs.aab_path }}"
          AAB_NAME="${{ steps.prepare.outputs.aab_name }}"
          echo "Uploading $AAB_NAME to Pixeldrain..."

          RESPONSE=$(curl -s -T "$AAB" "https://pixeldrain.com/api/file/$AAB_NAME")
          FILE_ID=$(echo $RESPONSE | jq -r '.id')

          if [ "$FILE_ID" != "null" ] && [ -n "$FILE_ID" ]; then
            DIRECT_LINK="https://pixeldrain.com/u/$FILE_ID"
            API_LINK="https://pixeldrain.com/api/file/$FILE_ID?download"
            echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_OUTPUT
            echo "API_LINK=$API_LINK" >> $GITHUB_OUTPUT
            echo "✅ Pixeldrain: $DIRECT_LINK"
          else
            echo "⚠️ Pixeldrain upload failed, AAB still available as artifact"
          fi

      # ── Summary ──
      - name: "📋 Build Summary"
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           📦 RELEASE AAB BUILD COMPLETE             ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  Version:  ${{ steps.version.outputs.full_version }}"
          echo "║  File:     ${{ steps.prepare.outputs.aab_name }}"
          echo "║  Size:     ${{ steps.prepare.outputs.aab_size }}"
          if [ -n "${{ steps.pixeldrain.outputs.DIRECT_LINK }}" ]; then
            echo "║  Download: ${{ steps.pixeldrain.outputs.DIRECT_LINK }}"
          fi
          echo "║"
          echo "║  📥 Also available as GitHub artifact (90 days)"
          echo "║  🏪 Upload the .aab file to Google Play Console"
          echo "╚══════════════════════════════════════════════════════╝"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📥 Download Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.pixeldrain.outputs.DIRECT_LINK }}" ]; then
            echo "🌐 **Pixeldrain:** ${{ steps.pixeldrain.outputs.DIRECT_LINK }}" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ **Direct:** ${{ steps.pixeldrain.outputs.API_LINK }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📌 Upload the AAB to [Google Play Console](https://play.google.com/console)" >> $GITHUB_STEP_SUMMARY

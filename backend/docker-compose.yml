services:
  # Backend API Server (uses existing MySQL on server)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-backend
    restart: unless-stopped
    environment:
      # Database - connect to host's MySQL
      DATABASE_HOST: ${DATABASE_HOST:-host.docker.internal}
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_USER: ${DATABASE_USER:-root}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-root}
      DATABASE_NAME: ${DATABASE_NAME:-pos_db}
      # Server
      PORT: 3030
      WS_PORT: 3031
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
      API_PREFIX: /api
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      # CORS
      CORS_ORIGIN: "*"
      # Rate Limiting
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_TIMEWINDOW: 60000
      # Logging
      LOG_LEVEL: info
      LOG_FILE_PATH: ./logs
    ports:
      - "3030:3030"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  pos-network:
    driver: bridge
